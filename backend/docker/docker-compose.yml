version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: finviz-postgres
    env_file:
      - ../.env  # Load from root .env file
    environment:
      # Only override if not in .env, but prefer .env values
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-finviz_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - finviz-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finviz-redis
    env_file:
      - ../.env
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - finviz-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: finviz-app
    env_file:
      - ../.env  # Load ALL environment variables from .env
    # No environment section needed - all vars come from .env
    ports:
      - "${FLASK_PORT:-5000}:5000"
    volumes:
      - ../uploads:/app/uploads
      - ../logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - finviz-network
    command: >
      sh -c "
        flask db upgrade &&
        gunicorn --bind 0.0.0.0:${GUNICORN_PORT:-5000} --workers ${GUNICORN_WORKERS:-4} wsgi:app
      "

  test:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: finviz-test
    env_file:
      - ../.env
    # No environment section needed
    volumes:
      - ../tests:/app/tests
      - ../.coverage:/app/.coverage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - finviz-network
    command: >
      sh -c "
        pytest --cov=app --cov-report=term --cov-report=html
      "

networks:
  finviz-network:
    driver: bridge
    